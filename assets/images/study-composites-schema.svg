  <text x="168" y="566" fill="#31465C" font-family="Arial, sans-serif" font-size="15">Which limitation of pure</text>
  <text x="168" y="592" fill="#31465C" font-family="Arial, sans-serif" font-size="15">liquid metal must the</text>
